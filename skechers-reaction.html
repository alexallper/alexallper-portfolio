<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Reaction — Mr. Quiggly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #1A1A18;
      --cream: #F5F0E8;
      --green-light: #52B788;
      --gray: #8A8478;
    }

    body {
      background: var(--black);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* HEADER */
    .press-header {
      padding: 80px 64px 56px;
      border-bottom: 1px solid rgba(245,240,232,0.08);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 40px;
    }

    .press-header__eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--green-light);
      margin-bottom: 16px;
    }

    .press-header__title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(48px, 6vw, 80px);
      line-height: 1.0;
      color: var(--cream);
    }

    .press-header__sub {
      font-size: 15px;
      color: rgba(245,240,232,0.45);
      font-weight: 300;
      max-width: 340px;
      line-height: 1.6;
      text-align: right;
    }

    .press-header__sub strong {
      color: var(--cream);
      font-weight: 600;
    }

    /* SECTION LABEL */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.3);
      padding: 48px 64px 24px;
    }

    /* HEADLINES GRID */
    .headlines-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      padding: 0 64px;
    }

    .headline-card {
      overflow: hidden;
      background: #fff;
      position: relative;
    }

    .headline-card--wide {
      grid-column: span 2;
    }

    .headline-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease, opacity 0.3s ease;
      opacity: 0.92;
    }

    .headline-card:hover img {
      transform: scale(1.03);
      opacity: 1;
    }

    /* DIVIDER */
    .divider {
      height: 1px;
      background: rgba(245,240,232,0.08);
      margin: 48px 64px;
    }

    /* TWEETS GRID */
    .tweets-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      padding: 0 64px;
    }

    .tweet-card {
      background: #fff;
      overflow: hidden;
    }

    .tweet-card img {
      width: 100%;
      display: block;
    }

    /* PRESS RELEASE */
    .press-release {
      padding: 0 64px;
    }

    .press-release img {
      width: 100%;
      display: block;
      opacity: 0.92;
    }

    /* FOOTER NOTE */
    .press-footer {
      padding: 56px 64px 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(245,240,232,0.08);
      margin-top: 64px;
    }

    .press-footer__back {
      font-size: 13px;
      color: var(--green-light);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: opacity 0.2s;
    }

    .press-footer__back:hover { opacity: 0.7; }

    .press-footer__credit {
      font-size: 11px;
      color: rgba(245,240,232,0.25);
      letter-spacing: 0.06em;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .press-header { padding: 48px 32px 40px; flex-direction: column; align-items: flex-start; }
      .press-header__sub { text-align: left; }
      .section-label { padding: 40px 32px 20px; }
      .headlines-grid, .tweets-grid, .press-release { padding: 0 32px; }
      .headlines-grid { grid-template-columns: 1fr; }
      .headline-card--wide { grid-column: span 1; }
      .tweets-grid { grid-template-columns: 1fr; }
      .divider { margin: 40px 32px; }
      .press-footer { padding: 40px 32px 56px; flex-direction: column; gap: 16px; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <header class="press-header">
    <div>
      <p class="press-header__eyebrow">Skechers · Super Bowl XLVI · 2012</p>
      <h1 class="press-header__title">The Reaction</h1>
    </div>
    <p class="press-header__sub">A French bulldog moonwalked across a finish line. The internet had thoughts. So did <strong>#3 USA Today Ad Meter</strong>.</p>
  </header>

  <p class="section-label">Press Coverage</p>

  <div class="headlines-grid">
    <div class="headline-card headline-card--wide">
      <img src="assets/img/press-huffpost.jpg" alt="HuffPost: Skechers Super Bowl Commercial: Mr Quiggly Replaces Kim Kardashian In Ad">
    </div>
    <div class="headline-card">
      <img src="assets/img/press-thr.jpg" alt="Hollywood Reporter: SKECHERS' Mr. Quiggly Super Bowl Commercial">
    </div>
    <div class="headline-card">
      <img src="assets/img/press-bizinsider.jpg" alt="Business Insider: This Dog Is Replacing Kim Kardashian In Skechers' Super Bowl Ad">
    </div>
    <div class="headline-card">
      <img src="assets/img/press-bleacher.jpg" alt="Bleacher Report: Super Bowl Commercials 2012: Mr. Quiggly the French Bulldog Will Steal the Show">
    </div>
    <div class="headline-card headline-card--wide">
      <img src="assets/img/press-dailynews.jpg" alt="Daily News: Super Bowl commercials: Skechers among the best">
    </div>
  </div>

  <div class="divider"></div>

  <p class="section-label">Twitter, Live</p>

  <div class="tweets-grid">
    <div class="tweet-card">
      <img src="assets/img/press-tweet-rovell.jpg" alt="Darren Rovell tweet">
    </div>
    <div class="tweet-card">
      <img src="assets/img/press-tweet-cooper.jpg" alt="Brent Cooper tweet">
    </div>
    <div class="tweet-card">
      <img src="assets/img/press-tweet-cannon.jpg" alt="J.W. Cannon tweet">
    </div>
  </div>

  <div class="divider"></div>

  <p class="section-label">Direct from Skechers</p>

  <div class="press-release">
    <img src="assets/img/press-release.jpg" alt="Skechers press release: Commits to Fourth Super Bowl Ad">
  </div>

  <footer class="press-footer">
    <a href="skechers.html" class="press-footer__back">← Back to Skechers</a>
    <span class="press-footer__credit">Alex Allper · alexallper.com</span>
  </footer>

</body>
</html>
